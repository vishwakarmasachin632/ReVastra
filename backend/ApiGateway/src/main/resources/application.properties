spring.application.name=API-GATEWAY
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/admin/**,/api/auth/**

# LAUNDRY SERVICE
spring.cloud.gateway.routes[1].id=laundry-service
spring.cloud.gateway.routes[1].uri=lb://LAUNDRY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/laundry/**

# ORDER SERVICE
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://ORDERSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**

# REWARD SERVICE
spring.cloud.gateway.routes[3].id=reward-service
spring.cloud.gateway.routes[3].uri=lb://REWARDSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/rewards/**

# PAYMENT SERVICE
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://PAYMENTSERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payment/**

# UPCYCLE SERVICE
spring.cloud.gateway.routes[5].id=upcycle-service
spring.cloud.gateway.routes[5].uri=lb://UPCYCLESERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/workers/**,/api/upcycle/**

# NOTIFICATION SERVICE
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://NOTIFICATIONSERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**

# RECYCLING SERVICE
spring.cloud.gateway.routes[7].id=recycling-service
spring.cloud.gateway.routes[7].uri=lb://RECYCLING-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/recycling/**